version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ai_usage_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_usage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hackathon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./step3_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  postgres_data:
