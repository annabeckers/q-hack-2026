services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/hackathon
    volumes:
      - ./src/backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-net
    restart: unless-stopped

  worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: dev
    command: uv run python scripts/run_analysis_worker.py --loop --interval 30
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/hackathon
    volumes:
      - ./src/backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/worker-healthy"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hackathon-net
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - hackathon-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/backend/scripts/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hackathon-net
    restart: unless-stopped

  dataloader:
    build:
      context: ./src/dataloader
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/hackathon
    volumes:
      - ./src/dataloader:/app
      - ./resources/data:/data
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-net
    profiles:
      - dataloader

volumes:
  postgres-data:

networks:
  hackathon-net:
    driver: bridge
