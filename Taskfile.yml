version: '3'

vars:
  BACKEND_DIR: src/backend
  FRONTEND_DIR: src/frontend
  DATALOADER_DIR: src/dataloader

tasks:
  # ── Docker ──────────────────────────────────────
  up:
    desc: Start all services (backend, worker, frontend, postgres)
    cmds:
      - DOCKER_BUILDKIT=1 docker compose up -d

  down:
    desc: Stop all services
    cmds:
      - docker compose down

  logs:
    desc: Tail all service logs
    cmds:
      - docker compose logs -f

  worker-logs:
    desc: Tail only the analysis worker logs
    cmds:
      - docker compose logs -f worker

  analyze:
    desc: Run analysis once (without Docker)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run python scripts/run_analysis_worker.py

  build:
    desc: Build all Docker images
    cmds:
      - docker compose build

  nuke:
    desc: Stop services and remove all volumes
    cmds:
      - docker compose down -v

  # ── Backend ─────────────────────────────────────
  dev:
    desc: Run backend in dev mode (local, not Docker)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  test:
    desc: Run backend tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/ -v

  lint:
    desc: Lint backend code
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff check app/ tests/
      - uv run ruff format --check app/ tests/

  fmt:
    desc: Format backend code
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format app/ tests/

  # ── Database ────────────────────────────────────
  migrate:
    desc: Run Alembic migrations
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run alembic upgrade head

  migration:
    desc: Create a new migration
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run alembic revision --autogenerate -m "{{.CLI_ARGS}}"

  # ── Frontend ────────────────────────────────────
  frontend:
    desc: Run frontend in dev mode
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - bun run dev

  frontend-build:
    desc: Build frontend for production
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - bun run build

  # ── Data ──────────────────────────────────────
  seed-database:
    desc: Seed database with demo data
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run python scripts/seed_database.py

  import-chats:
    desc: Import chat export files (JSON/MD) into PostgreSQL chats table
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run python scripts/run_chat_import.py

  # ── Dataloader ─────────────────────────────────
  ingest:
    desc: Run dataloader ingestion pipeline
    dir: "{{.DATALOADER_DIR}}"
    cmds:
      - uv run python -m dataloader.main ingest {{.CLI_ARGS}}

  # ── CI ────────────────────────────────────────
  ci:
    desc: Full CI pipeline locally (lint + test + build)
    cmds:
      - task: lint
      - task: test
      - task: frontend-build
